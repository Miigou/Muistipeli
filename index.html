<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muistipeli</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Muistipeli</h1>
    <button id="restart-btn">Aloita alusta</button>
    <div class="game-status" aria-live="polite">
        <span class="status-label">Yritykset</span>
        <span id="attempts-counter" class="status-value">0</span>
    </div>
    <div id="game-board"></div>
    <div id="win-overlay" class="hidden">
        <div id="win-message">
            <h2>Onneksi olkoon! 🎉</h2>
            <p>Löysit kaikki parit!</p>
            <p id="win-attempts"></p>
            <button id="play-again-btn">Pelaa uudelleen</button>
        </div>
    </div>
    <script type="module" src="./js/game.js"></script>
</body>
</html>
